<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fesageo - عن القسم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .scrollable-content {
            height: 450px; /* زيادة الطول قليلاً ليستوعب النصوص الجديدة */
            overflow-y: auto;
            padding: 25px;
            background-color: #1a2a3a;
            border-radius: 15px;
            color: #cbd5e1;
            text-align: right;
            border: 1px solid #334155;
        }
        .about-box { margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .about-box h3 { color: #38bdf8; margin-bottom: 15px; font-size: 1.2rem; }
        .about-box p { line-height: 1.9; font-size: 16px; margin-bottom: 10px; }
        .about-box ul { padding-right: 20px; line-height: 1.8; }
        .scrollable-content::-webkit-scrollbar { width: 8px; }
        .scrollable-content::-webkit-scrollbar-thumb { background-color: #38bdf8; border-radius: 10px; }
        .loading-text { text-align: center; color: #94a3b8; padding: 40px 0; }
    </style>
</head>
<body>

<div class="hero-wrapper">
    <nav class="header-nav">
        <div class="nav-links">
            <a href="index.html" class="nav-item">الرئيسية</a>
            <a href="doctors.html" class="nav-item">الهيئة التدريسية</a>
            <a href="https://maps.google.com/?q=Faculty+of+Educational+Sciences+%26+Arts+FESA+UNRWA" target="_blank" class="nav-item">موقع الجامعة</a>
            <a href="about.html" class="nav-item active">عن القسم</a>
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=fesageo@gmail.com" target="_blank" class="contact-link">تواصل معنا</a>
        </div>
        <div class="brand-box">
            <div class="site-title">Fesa<span>geo</span></div>
            <img src="https://i.ibb.co/Fk3Yy8Qb/image.png" alt="شعار الكلية" class="logo-img">
        </div>
    </nav>
    
    <div class="hero-content">
        <div class="card" style="max-width:800px; width:90%; padding:2.5rem; text-align:right;">
            <div style="text-align:center; margin-bottom:1rem;"><i class="fas fa-university tech-icon"></i></div>
            <h2 style="text-align:center; color:white; margin-bottom:2rem;">عن القسم</h2>
            
            <div class="scrollable-content" id="aboutContent">
                <p class="loading-text">جاري تحميل المحتوى...</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { db, doc, getDoc } from "./firebase-config.js";

/* محتوى صفحة "عن القسم" يُقرأ من مجموعة Firestore "about-page"،
   وثيقة واحدة بمعرّف "content". تعديل النصوص يكون يدوياً من Firebase Console مباشرة. */

async function loadAboutContent(){
    const container = document.getElementById('aboutContent');

    try{
        const docRef = doc(db, "about-page", "content");
        const docSnap = await getDoc(docRef);

        if(!docSnap.exists()){
            container.innerHTML = `<p class="loading-text">المحتوى غير متوفر حالياً.</p>`;
            return;
        }

        const data = docSnap.data();
        const goalsHtml = (data.visionGoals || [])
            .map(goal => `<li>${goal}</li>`)
            .join('');

        container.innerHTML = `
            <div class="about-box">
                <h3>${data.deanTitle || ''}</h3>
                <p>${data.deanMessage || ''}</p>
            </div>

            <div class="about-box">
                <h3>${data.headTitle || ''}</h3>
                <p>${data.headMessage || ''}</p>
            </div>

            <div class="about-box">
                <h3>رؤية وأهداف القسم</h3>
                <p>${data.visionIntro || ''}</p>
                <ul>${goalsHtml}</ul>
            </div>
        `;
    } catch(err){
        console.error("خطأ بجلب محتوى صفحة عن القسم من Firestore:", err);
        container.innerHTML = `<p class="loading-text">تعذّر تحميل المحتوى، حاول تحديث الصفحة بعد قليل.</p>`;
    }
}

loadAboutContent();
</script>

</body>
</html>
