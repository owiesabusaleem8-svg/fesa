<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسائل الخريجين | Fesageo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#070b14;
    --teal:#00d9c0;
    --teal-dim: rgba(0,217,192,0.35);
    --navy:#13233f;
    --gold:#d4af6a;
    --ink:#eaf2f4;
    --ink-dim:#9fb3c0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--bg-deep);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    overflow-x:hidden;
    width:100%;
    min-height:100%;
  }
  #stage{
    position:relative;
    width:100%;
    min-height:100vh;
    overflow:hidden;
  }
  #stars-canvas{
    position:fixed; inset:0;
    width:100%; height:100%;
    z-index:0;
  }

  .page-header{
    position:relative;
    z-index:5;
    text-align:center;
    padding:50px 20px 10px;
  }
  .page-header .eyebrow{
    font-size:13px;
    letter-spacing:.18em;
    color:var(--teal);
    text-transform:uppercase;
    font-weight:500;
    opacity:.85;
  }
  .page-header h1{
    margin:6px 0 0;
    font-size:clamp(26px,4vw,42px);
    font-weight:800;
    letter-spacing:-0.5px;
    background:linear-gradient(90deg,#eaf2f4, var(--teal) 60%, var(--gold));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .page-header p{
    margin:8px auto 0;
    max-width:520px;
    color:var(--ink-dim);
    font-size:14px;
    line-height:1.7;
  }

  .counter-pill{
    position:fixed;
    top:24px; left:24px;
    z-index:6;
    background:rgba(10,17,32,.55);
    border:1px solid var(--teal-dim);
    backdrop-filter:blur(10px);
    border-radius:999px;
    padding:8px 18px;
    font-size:13px;
    color:var(--ink-dim);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .counter-pill b{color:var(--teal);font-weight:700;}
  .counter-pill .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 8px var(--teal);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ============ حقل الطفو ============ */
  #float-field{
    position:relative;
    z-index:2;
    width:100%;
    height:calc(100vh - 150px);
    min-height:560px;
  }

  /* ============ المغلف (بطاقة سايبربنك) ============ */
  .letter{
    position:absolute;
    width:150px;
    height:108px;
    cursor:pointer;
    will-change:transform;
    perspective:900px;
  }
  .letter-face{
    position:absolute; inset:0;
    border-radius:10px;
    background:linear-gradient(155deg, rgba(19,35,63,.7), rgba(7,14,26,.85));
    border:1.4px solid var(--teal-dim);
    box-shadow:
      0 0 18px rgba(0,217,192,0.18),
      inset 0 0 22px rgba(0,217,192,0.06);
    backdrop-filter:blur(6px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:box-shadow .3s ease, border-color .3s ease, transform .25s ease;
    overflow:hidden;
  }
  /* خط القفل الأنيق نص المغلف */
  .letter-face::before{
    content:'';
    position:absolute;
    top:0; right:0; left:0;
    height:50%;
    background:linear-gradient(160deg, rgba(0,217,192,0.10), transparent 70%);
    clip-path:polygon(0 0,100% 0,50% 60%);
    border-bottom:1px solid rgba(0,217,192,0.25);
  }
  .letter-seal{
    position:relative;
    z-index:2;
    width:34px; height:34px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(0,217,192,0.9), rgba(0,90,80,0.5));
    box-shadow:0 0 14px rgba(0,217,192,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#04130f;
    font-weight:800;
  }
  .letter-name-hint{
    position:relative;
    z-index:2;
    margin-top:8px;
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:.05em;
    max-width:90%;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .letter:hover .letter-face{
    border-color:var(--teal);
    box-shadow:
      0 0 30px rgba(0,217,192,0.4),
      inset 0 0 26px rgba(0,217,192,0.1);
    transform:translateY(-3px) scale(1.03);
  }
  .letter.opened{ opacity:0; pointer-events:none; }

  @media (max-width:600px){
    .letter{width:118px; height:88px;}
    .letter-seal{width:28px; height:28px; font-size:11px;}
    .letter-name-hint{font-size:10px;}
  }

  /* ============ Viewer (فتح المغلف) ============ */
  .viewer-backdrop{
    position:fixed; inset:0;
    background:rgba(4,7,14,0.82);
    backdrop-filter:blur(6px);
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .35s ease;
    padding:20px;
  }
  .viewer-backdrop.open{ opacity:1; pointer-events:auto; }

  .opened-letter{
    width:min(620px,94vw);
    max-height:86vh;
    position:relative;
  }
  /* الغطاء العلوي يدور لفوق كحركة فتح حقيقية */
  .lid{
    position:absolute;
    top:0; left:0; right:0;
    height:120px;
    background:linear-gradient(155deg, rgba(19,35,63,.95), rgba(7,14,26,.98));
    border:1.4px solid var(--teal);
    border-bottom:none;
    border-radius:14px 14px 0 0;
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top center;
    transform:rotateX(0deg);
    transition:transform .55s cubic-bezier(.2,.8,.3,1.1);
    z-index:3;
    box-shadow:0 0 30px rgba(0,217,192,0.25);
  }
  .viewer-backdrop.open .lid{
    transform:rotateX(-165deg);
  }

  .letter-content{
    position:relative;
    background:linear-gradient(170deg, rgba(13,24,43,.95), rgba(6,10,18,.98));
    border:1.4px solid var(--teal-dim);
    border-radius:14px;
    padding:38px 32px 28px;
    box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 50px rgba(0,217,192,0.08);
    max-height:86vh;
    overflow-y:auto;
    opacity:0;
    transform:translateY(14px);
    transition:opacity .4s ease .25s, transform .4s ease .25s;
  }
  .viewer-backdrop.open .letter-content{
    opacity:1;
    transform:translateY(0);
  }

  .grad-portrait{
    width:74px; height:74px;
    border-radius:50%;
    margin:0 auto 14px;
    display:block;
    object-fit:cover;
    border:2px solid var(--teal);
    box-shadow:0 0 22px rgba(0,217,192,0.4);
  }
  .grad-name{
    text-align:center;
    font-size:21px;
    font-weight:800;
    color:#fff;
    margin:0;
  }
  .grad-year{
    text-align:center;
    font-size:12.5px;
    color:var(--gold);
    letter-spacing:.12em;
    margin:4px 0 0;
    font-weight:600;
  }
  .grad-divider{
    width:60px; height:1px;
    background:linear-gradient(90deg, transparent, var(--teal), transparent);
    margin:18px auto;
  }
  .grad-message{
    font-size:15px;
    line-height:2;
    color:var(--ink-dim);
    text-align:center;
    white-space:pre-line;
  }

  .viewer-footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:22px;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .nav-btns{display:flex; gap:10px;}
  .nav-btn{
    width:38px; height:38px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.04);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:all .2s ease;
    font-size:15px;
  }
  .nav-btn:hover{ background:var(--teal); border-color:var(--teal); color:#04130f; }
  .counter-small{ font-size:12px; color:var(--ink-dim); }
  .counter-small b{ color:var(--teal); }

  .close-btn{
    position:absolute;
    top:-44px; left:0;
    width:34px; height:34px;
    border-radius:50%;
    background:rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,0.15);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:5;
    font-size:17px;
    transition:background .2s;
  }
  .close-btn:hover{ background:rgba(255,80,80,.5); }

  @media (prefers-reduced-motion: reduce){
    .counter-pill .dot{animation:none;}
    .lid, .letter-content{transition:none;}
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="counter-pill">
  <span class="dot"></span>
  <span><b id="letterCount">0</b> رسالة من خريجي الدفعة</span>
</div>

<div id="stage">
  <div class="page-header">
    <div class="eyebrow">Fesageo · قسم الجغرافيا ونظم المعلومات الجغرافية</div>
    <h1>رسائل الخريجين</h1>
    <p>كلمات تركها من سبقونا في الرحلة — افتح أي مغلف لتقرأ ما تركوه لنا</p>
  </div>

  <div id="float-field"></div>
</div>

<!-- Viewer: المغلف المفتوح -->
<div class="viewer-backdrop" id="viewerBackdrop">
  <div class="opened-letter">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="lid">
      <div class="letter-seal" style="margin:auto;"></div>
    </div>
    <div class="letter-content">
      <img class="grad-portrait" id="gradPortrait" src="" alt="" onerror="this.style.display='none'">
      <h3 class="grad-name" id="gradName"></h3>
      <p class="grad-year" id="gradYear"></p>
      <div class="grad-divider"></div>
      <p class="grad-message" id="gradMessage"></p>
      <div class="viewer-footer">
        <div class="nav-btns">
          <button class="nav-btn" id="prevBtn" aria-label="السابق">›</button>
          <button class="nav-btn" id="nextBtn" aria-label="التالي">‹</button>
        </div>
        <div class="counter-small"><b id="curIdx">1</b> / <span id="totalIdx">10</span></div>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   رسائل الخريجين — مغلفات سايبربنك تطفو في الفضاء
   بيانات تجريبية الآن، لاحقاً نقرأها من Firebase
   ========================================================= */

/* ---------- 1) بيانات الرسائل (تجريبية - استبدلها بسهولة) ---------- */
const letters = [
  {name:"سارة العتيبي", year:"دفعة 2022", portrait:"https://i.pravatar.cc/150?img=47",
   message:"أربع سنوات مرت كلمح البصر. أشكر كل من علّمني حب الخرائط ورأى فيّ أكثر من رقم في كشف الحضور. القسم صار بيتي الثاني."},
  {name:"محمد الهاجري", year:"دفعة 2022", portrait:"https://i.pravatar.cc/150?img=12",
   message:"تعلمت أن الجغرافيا ليست خطوط على ورق، بل قصص أرض وإنسان. أوصي كل طالب جديد أن يحب التخصص قبل أن يدرسه."},
  {name:"نورة الشمري", year:"دفعة 2023", portrait:"https://i.pravatar.cc/150?img=32",
   message:"مختبر GIS كان نقطة تحوّل بحياتي الأكاديمية. من هناك بدأت أحب التحليل المكاني وقررت أتخصص فيه بالدراسات العليا."},
  {name:"خالد بن سعيد", year:"دفعة 2023", portrait:"https://i.pravatar.cc/150?img=51",
   message:"الرحلات الميدانية أعطتني أكثر من أي محاضرة نظرية. شكراً لكل دكتور تحمّل الحر والغبار معنا في الميدان."},
  {name:"ريم القحطاني", year:"دفعة 2024", portrait:"https://i.pravatar.cc/150?img=44",
   message:"مشروع التخرج كان أصعب وأجمل تجربة بالجامعة. تعلمت الصبر، تعلمت البحث، وتعلمت إني أقدر أكثر مما كنت أتخيل."},
  {name:"عبدالله الزهراني", year:"دفعة 2024", portrait:"https://i.pravatar.cc/150?img=15",
   message:"للي قادمين بعدي: لا تستهينوا بمادة الاستشعار عن بعد، هي أساس كل شي بتسوونه بالتخصص مستقبلاً."},
  {name:"لمى الدوسري", year:"دفعة 2025", portrait:"https://i.pravatar.cc/150?img=29",
   message:"أصدقاء القسم صاروا عائلة. كل سهرة مذاكرة وكل نقاش بمشروع جماعي بنى ذكرى راح تضل معايا للأبد."},
  {name:"فيصل العمري", year:"دفعة 2025", portrait:"https://i.pravatar.cc/150?img=68",
   message:"شكراً لكل من صبر علينا بمادة نظم المعلومات الجغرافية المتقدمة. الصبر طويل بس النتيجة كانت تستحق."},
  {name:"هدى المطيري", year:"دفعة 2026", portrait:"https://i.pravatar.cc/150?img=24",
   message:"اليوم أكتب هذي الرسالة وأنا على بعد أيام من التخرج. شكراً فسا جيو على أربع سنوات غيّرت نظرتي للعالم حرفياً."},
  {name:"تركي الشهري", year:"دفعة 2026", portrait:"https://i.pravatar.cc/150?img=33",
   message:"من أول محاضرة جغرافيا عامة إلى آخر دفاع لمشروع التخرج — كل لحظة كانت تستحق. نراكم في الميدان يا زملاء المستقبل 🎓"},
];

/* ---------- 2) خلفية النجوم ---------- */
(function starsBG(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){
    c.width = innerWidth; c.height = innerHeight;
    stars = [];
    const count = Math.floor((innerWidth*innerHeight)/4500);
    for(let i=0;i<count;i++){
      stars.push({
        x:Math.random()*c.width, y:Math.random()*c.height,
        r:Math.random()*1.3+0.2, a:Math.random()*0.6+0.2, tw:Math.random()*0.02+0.005
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle = '#070b14';
    ctx.fillRect(0,0,c.width,c.height);
    for(const s of stars){
      s.a += s.tw;
      const alpha = 0.4 + Math.sin(s.a)*0.4;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(220,235,240,${Math.max(0,alpha)})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); draw();
})();

/* ---------- 3) إنشاء المغلفات + توزيعها بالحقل ---------- */
const field = document.getElementById('float-field');
document.getElementById('letterCount').textContent = letters.length;
document.getElementById('totalIdx').textContent = letters.length;

const letterEls = letters.map((data, i)=>{
  const el = document.createElement('div');
  el.className = 'letter';
  el.innerHTML = `
    <div class="letter-face">
      <div class="letter-seal">${data.name.trim()[0]}</div>
      <div class="letter-name-hint">${data.name}</div>
    </div>
  `;
  field.appendChild(el);
  el.addEventListener('click', ()=> openLetter(i));

  return {
    el,
    index:i,
    // موقع أساسي عشوائي منتشر بالحقل
    baseX: Math.random()*80 + 5,   // % من العرض
    baseY: Math.random()*78 + 8,   // % من الارتفاع
    // معاملات الطفو (سعة وسرعة مختلفة لكل مغلف = حركة عضوية لا متزامنة)
    ampX: 14 + Math.random()*18,
    ampY: 10 + Math.random()*14,
    speedX: 0.15 + Math.random()*0.2,
    speedY: 0.12 + Math.random()*0.22,
    phaseX: Math.random()*Math.PI*2,
    phaseY: Math.random()*Math.PI*2,
    rot: (Math.random()*6-3),
  };
});

/* ---------- 4) فيزياء الطفو (نفس روح الأقمار بالـ Globe) ---------- */
let t = 0;
function floatLoop(){
  t += 0.016;
  const fw = field.clientWidth, fh = field.clientHeight;

  letterEls.forEach(L=>{
    const dx = Math.sin(t*L.speedX + L.phaseX) * L.ampX;
    const dy = Math.cos(t*L.speedY + L.phaseY) * L.ampY;
    const x = (L.baseX/100)*fw + dx;
    const y = (L.baseY/100)*fh + dy;
    const rotWobble = Math.sin(t*L.speedX*0.6 + L.phaseX) * L.rot;

    L.el.style.transform = `translate(${x}px, ${y}px) rotate(${rotWobble}deg)`;
  });

  requestAnimationFrame(floatLoop);
}
// تثبيت الموضع الأولي بدون انتظار أول فريم (يمنع "ارتجاجة" البداية)
letterEls.forEach(L=>{
  const fw = field.clientWidth, fh = field.clientHeight;
  L.el.style.position='absolute';
  L.el.style.left='0'; L.el.style.top='0';
  L.el.style.transform = `translate(${(L.baseX/100)*fw}px, ${(L.baseY/100)*fh}px)`;
});
requestAnimationFrame(floatLoop);

window.addEventListener('resize', ()=>{ /* الحقل % مرن أصلاً، يعيد التوزيع تلقائياً بالفريم القادم */ });

/* ---------- 5) فتح/إغلاق المغلف ---------- */
let currentIndex = 0;
const backdrop = document.getElementById('viewerBackdrop');
const gradPortrait = document.getElementById('gradPortrait');
const gradName = document.getElementById('gradName');
const gradYear = document.getElementById('gradYear');
const gradMessage = document.getElementById('gradMessage');
const curIdxEl = document.getElementById('curIdx');

function openLetter(index){
  currentIndex = index;
  letterEls[index].el.classList.add('opened');
  renderLetter();
  backdrop.classList.add('open');
}
function closeLetter(){
  backdrop.classList.remove('open');
  letterEls.forEach(L=> L.el.classList.remove('opened'));
}
function renderLetter(){
  const d = letters[currentIndex];
  gradPortrait.style.display='block';
  gradPortrait.src = d.portrait || '';
  gradPortrait.alt = d.name;
  gradName.textContent = d.name;
  gradYear.textContent = d.year;
  gradMessage.textContent = d.message;
  curIdxEl.textContent = currentIndex+1;
}
document.getElementById('closeBtn').addEventListener('click', closeLetter);
backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) closeLetter(); });

document.getElementById('nextBtn').addEventListener('click', ()=>{
  letterEls[currentIndex].el.classList.remove('opened');
  currentIndex = (currentIndex+1) % letters.length;
  letterEls[currentIndex].el.classList.add('opened');
  renderLetter();
});
document.getElementById('prevBtn').addEventListener('click', ()=>{
  letterEls[currentIndex].el.classList.remove('opened');
  currentIndex = (currentIndex-1+letters.length) % letters.length;
  letterEls[currentIndex].el.classList.add('opened');
  renderLetter();
});
document.addEventListener('keydown', (e)=>{
  if(!backdrop.classList.contains('open')) return;
  if(e.key==='Escape') closeLetter();
  if(e.key==='ArrowLeft') document.getElementById('nextBtn').click();
  if(e.key==='ArrowRight') document.getElementById('prevBtn').click();
});
</script>
</body>
</html>
