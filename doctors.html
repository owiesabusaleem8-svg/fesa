<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الهيئة التدريسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تنسيق النافذة المنبثقة عشان تظهر فوق كل شيء */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; /* مخفية بالبداية */
            justify-content: center; align-items: center; z-index: 9999;
        }
        .popup-overlay.active { display: flex; }
        .popup-box {
            background: #0a192f; width: 90%; max-width: 600px; height: 80vh;
            border-radius: 15px; padding: 20px; position: relative;
            display: flex; flex-direction: column; color: white; border: 1px solid #00f2ff;
        }
        .courses-scroll-container { flex: 1; overflow-y: auto; margin-top: 20px; }
        .popup-close { position: absolute; top: 10px; right: 10px; cursor: pointer; color: white; background: none; border: none; font-size: 20px; }
        /* تنسيق المواد */
        .mini-course-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<button onclick="openCoursesPopup()">استعراض كافة المواد</button>

<div class="popup-overlay" id="coursesPopup">
    <div class="popup-box">
        <button class="popup-close" onclick="closeCoursesPopup()">X</button>
        <h3>المكتبة الدراسية</h3>
        <div class="courses-scroll-container">
            <div id="coursesList"></div>
        </div>
    </div>
</div>

<script>
    function openCoursesPopup() { document.getElementById('coursesPopup').classList.add('active'); }
    function closeCoursesPopup() { document.getElementById('coursesPopup').classList.remove('active'); }

    // توليد المواد
    const list = document.getElementById('coursesList');
    for(let i = 1; i <= 40; i++) {
        list.innerHTML += `
            <div class="mini-course-item">
                <span>مادة دراسية رقم ${i}</span>
                <a href="#">تحميل</a>
            </div>
        `;
    }
</script>
</body>
</html>
