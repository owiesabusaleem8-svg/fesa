<!DOCTYPE html>

<head>

    <title>Fesageo - الأنشطة والأرشيف</title>
    <!-- مكتبات التنسيق والخرائط -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #cbd5e1; margin: 0; }
        
        /* إضافة تنسيق الـ Navbar */
        .navbar {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-link { color: #38bdf8; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .nav-link:hover { color: white; }

        .activities-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        
        .glass-box { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 25px; 
            border-radius: 20px; 
            margin-bottom: 30px; 
        }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .gallery-item { height: 250px; background: #0f172a; border: 2px solid transparent; border-radius: 15px; overflow: hidden; transition: 0.4s; position: relative; }
        .gallery-item:hover { transform: translateY(-10px); border-color: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        #map { height: 300px; border-radius: 15px; border: 2px solid #38bdf8; margin-top: 15px; }
    </style>
</head>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fesageo - الرئيسية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero-wrapper">
    
    <nav class="header-nav">
        <div class="nav-links">
            <a href="index.html" class="nav-item active">الرئيسية</a>
            <a href="doctors.html" class="nav-item">الهيئة التدريسية</a>
            <a href="https://maps.google.com/?q=Faculty+of+Educational+Sciences+%26+Arts+FESA+UNRWA" target="_blank" class="nav-item">موقع الجامعة (اللوكيشن)</a>
            <a href="about.html" class="nav-item">عن القسم</a>
            <a href="mailto:fesageo@gmail.com" class="contact-link">تواصل معنا</a>
        </div>
        
        <div class="brand-box">
            <div class="site-title">Fesa<span>geo</span></div>
            <img src="https://i.ibb.co/Fk3Yy8Qb/image.png" alt="شعار الكلية" class="logo-img">
        </div>
    </nav>

<div class="activities-container">
    <h2 style="color: white; text-align: center; margin-bottom: 30px;">أرشيف الأنشطة والفعاليات</h2>

    <!-- قسم الأخبار -->
    <div class="glass-box">
        <h3 style="color: #38bdf8;"><i class="fas fa-bolt"></i> تحديثات القسم</h3>
        <p>📌 رحلة ميدانية لمحمية ضانا - قريباً</p>
        <p>📢 فتح باب التقديم لمشروع "جغرافي التقني"</p>
    </div>

    <!-- معرض الصور -->
    <div class="gallery-grid">
        <div class="gallery-item"><img src="image.png" alt="نشاط 1"></div>
        <div class="gallery-item"><img src="image.png" alt="نشاط 2"></div>
        <div class="gallery-item"><img src="image.png" alt="نشاط 3"></div>
        <div class="gallery-item"><img src="image.png" alt="نشاط 4"></div>
    </div>

    <!-- الخريطة -->
    <div class="glass-box" style="margin-top: 30px;">
        <h3 style="color: #38bdf8;"><i class="fas fa-map-marked-alt"></i> الخريطة التفاعلية للأنشطة</h3>
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([31.95, 35.93], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([31.95, 35.93]).addTo(map).bindPopup('موقع نشاط طلابي ميداني');
</script>

</body>
</html>
