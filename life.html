<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fesageo - الأنشطة والأرشيف</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .activities-container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        
        /* شبكة معرض الصور */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .gallery-item { height: 200px; background: #334155; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .gallery-item:hover { transform: scale(1.05); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* قسم الأخبار والأحداث */
        .news-section { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        .news-item { padding: 10px; border-bottom: 1px solid #334155; color: #fff; }
    </style>
</head>
<body>

<div class="activities-container">
    <h2 style="color: white; text-align: center; margin-bottom: 30px;">أرشيف الأنشطة والأحداث</h2>

    <!-- قسم الأخبار والأحداث القادمة -->
    <div class="news-section">
        <h3>الأحداث القادمة وأحدث الأخبار</h3>
        <div class="news-item">📌 رحلة ميدانية لمحمية ضانا - الأسبوع القادم</div>
        <div class="news-item">📢 فتح باب التسجيل لمشروع "جغرافي التقني"</div>
    </div>

    <!-- معرض الصور الديناميكي -->
    <div class="gallery-grid">
        <div class="gallery-item"><img src="image1.jpg" alt="نشاط 1"></div>
        <div class="gallery-item"><img src="image2.jpg" alt="نشاط 2"></div>
        <div class="gallery-item"><img src="image3.jpg" alt="نشاط 3"></div>
        <div class="gallery-item"><img src="image4.jpg" alt="نشاط 4"></div>
    </div>
</div>

</body>
</html>
