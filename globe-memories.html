<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globe Memories | ذكريات حول العالم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#070b14;
    --bg-deep2:#0a1120;
    --teal:#00d9c0;
    --teal-dim: rgba(0,217,192,0.35);
    --navy:#13233f;
    --gold:#d4af6a;
    --ink:#eaf2f4;
    --ink-dim:#9fb3c0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--bg-deep);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    overflow-x:hidden;
    height:100%;
    width:100%;
  }
  #stage{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
  }
  /* خلفية فضاء مع نجوم */
  #stars-canvas{
    position:absolute; inset:0;
    width:100%; height:100%;
    z-index:0;
  }
  #globe-canvas{
    position:absolute; inset:0;
    width:100%; height:100%;
    z-index:1;
    cursor:grab;
  }
  #globe-canvas:active{cursor:grabbing;}

  /* رأس الصفحة */
  .page-header{
    position:absolute;
    top:0; right:0; left:0;
    z-index:5;
    text-align:center;
    padding:34px 20px 0;
    pointer-events:none;
  }
  .page-header .eyebrow{
    font-size:13px;
    letter-spacing:.18em;
    color:var(--teal);
    text-transform:uppercase;
    font-weight:500;
    opacity:.85;
  }
  .page-header h1{
    margin:6px 0 0;
    font-size:clamp(26px,4vw,42px);
    font-weight:800;
    letter-spacing:-0.5px;
    background:linear-gradient(90deg,#eaf2f4, var(--teal) 60%, var(--gold));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .page-header p{
    margin:8px auto 0;
    max-width:520px;
    color:var(--ink-dim);
    font-size:14px;
    line-height:1.7;
  }

  /* عداد الذكريات أعلى الزاوية */
  .counter-pill{
    position:absolute;
    top:28px; left:28px;
    z-index:6;
    background:rgba(10,17,32,.55);
    border:1px solid var(--teal-dim);
    backdrop-filter:blur(10px);
    border-radius:999px;
    padding:8px 18px;
    font-size:13px;
    color:var(--ink-dim);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .counter-pill b{color:var(--teal);font-weight:700;}
  .counter-pill .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 8px var(--teal);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* تلميح التفاعل */
  .hint{
    position:absolute;
    bottom:26px; right:50%; transform:translateX(50%);
    z-index:6;
    font-size:12.5px;
    color:var(--ink-dim);
    background:rgba(10,17,32,.5);
    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(8px);
    padding:8px 16px;
    border-radius:999px;
    white-space:nowrap;
    transition:opacity .6s ease;
  }
  .hint.fade{opacity:0;}

  /* === Satellite frame (DOM overlay لكل صورة) === */
  .sat{
    position:absolute;
    width:64px; height:64px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    cursor:pointer;
    z-index:3;
    transition:box-shadow .25s ease, border-color .25s ease;
    border:2px solid var(--teal-dim);
    box-shadow:0 0 14px rgba(0,217,192,0.18), inset 0 0 10px rgba(0,0,0,.4);
    background:#0a1120;
    overflow:hidden;
  }
  .sat img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    opacity:.92;
    filter:saturate(1.05) contrast(1.02);
  }
  .sat::after{
    content:'';
    position:absolute; inset:0;
    border-radius:50%;
    background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.18), transparent 55%);
    pointer-events:none;
  }
  .sat:hover{
    border-color:var(--teal);
    box-shadow:0 0 26px rgba(0,217,192,0.55), inset 0 0 10px rgba(0,0,0,.4);
  }
  .sat.active{
    opacity:0;
    pointer-events:none;
  }

  /* === Detail Viewer (overlay كامل) === */
  .viewer-backdrop{
    position:fixed; inset:0;
    background:rgba(4,7,14,0.78);
    backdrop-filter:blur(6px);
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .35s ease;
  }
  .viewer-backdrop.open{
    opacity:1;
    pointer-events:auto;
  }
  .viewer-card{
    width:min(880px,92vw);
    max-height:88vh;
    display:flex;
    flex-direction:column;
    background:linear-gradient(160deg, rgba(19,35,63,.92), rgba(7,11,20,.96));
    border:1px solid var(--teal-dim);
    border-radius:18px;
    box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(0,217,192,0.08);
    overflow:hidden;
    transform:scale(.9) translateY(20px);
    transition:transform .4s cubic-bezier(.2,.9,.25,1);
  }
  .viewer-backdrop.open .viewer-card{
    transform:scale(1) translateY(0);
  }
  @media (min-width:760px){
    .viewer-card{flex-direction:row; max-height:560px;}
  }
  .viewer-image{
    position:relative;
    flex:1 1 50%;
    min-height:260px;
    background:#000;
    overflow:hidden;
  }
  .viewer-image img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .viewer-image .glow-edge{
    position:absolute; inset:0;
    box-shadow:inset 0 0 60px rgba(0,0,0,.55);
    pointer-events:none;
  }
  .viewer-body{
    flex:1 1 50%;
    padding:28px 30px 24px;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
  }
  .viewer-date{
    font-size:12px;
    letter-spacing:.14em;
    color:var(--gold);
    text-transform:uppercase;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .viewer-date::before{
    content:'';
    width:18px; height:1px;
    background:var(--gold);
    display:inline-block;
  }
  .viewer-title{
    margin:10px 0 0;
    font-size:24px;
    font-weight:800;
    color:#fff;
    line-height:1.3;
  }
  .viewer-desc{
    margin:14px 0 0;
    font-size:14.5px;
    line-height:1.85;
    color:var(--ink-dim);
    flex:1;
  }
  .viewer-footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:18px;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .nav-btns{display:flex; gap:10px;}
  .nav-btn{
    width:40px; height:40px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.04);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:all .2s ease;
    font-size:16px;
  }
  .nav-btn:hover{
    background:var(--teal);
    border-color:var(--teal);
    color:#04130f;
  }
  .counter-small{
    font-size:12.5px;
    color:var(--ink-dim);
    letter-spacing:.05em;
  }
  .counter-small b{color:var(--teal);}
  .close-btn{
    position:absolute;
    top:14px; left:14px;
    width:36px; height:36px;
    border-radius:50%;
    background:rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,0.15);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:5;
    font-size:18px;
    transition:background .2s;
  }
  .close-btn:hover{background:rgba(255,80,80,.5);}

  @media (max-width:600px){
    .sat{width:46px; height:46px;}
    .viewer-body{padding:20px;}
    .viewer-title{font-size:19px;}
  }

  @media (prefers-reduced-motion: reduce){
    .counter-pill .dot{animation:none;}
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="stars-canvas"></canvas>
  <canvas id="globe-canvas"></canvas>

  <div class="page-header">
    <div class="eyebrow">Fesageo · قسم الجغرافيا ونظم المعلومات الجغرافية</div>
    <h1>Globe Memories</h1>
    <p>كل صورة نقطة على الخريطة، وكل نقطة حكاية من رحلتنا الميدانية حول العالم</p>
  </div>

  <div class="counter-pill">
    <span class="dot"></span>
    <span><b id="memCount">0</b> ذكرى مُسجّلة في المدار</span>
  </div>

  <div class="hint" id="hintEl">حرّك الماوس لتدوير الكرة · اضغط على أي صورة لعرض تفاصيلها</div>
</div>

<!-- Detail Viewer -->
<div class="viewer-backdrop" id="viewerBackdrop">
  <div class="viewer-card">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="viewer-image">
      <img id="viewerImg" src="" alt="">
      <div class="glow-edge"></div>
    </div>
    <div class="viewer-body">
      <div class="viewer-date" id="viewerDate"></div>
      <h3 class="viewer-title" id="viewerTitle"></h3>
      <p class="viewer-desc" id="viewerDesc"></p>
      <div class="viewer-footer">
        <div class="nav-btns">
          <button class="nav-btn" id="prevBtn" aria-label="السابق">›</button>
          <button class="nav-btn" id="nextBtn" aria-label="التالي">‹</button>
        </div>
        <div class="counter-small"><b id="curIdx">1</b> / <span id="totalIdx">20</span></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   GLOBE MEMORIES
   - كرة أرضية واقعية (Three.js)
   - 20+ صورة كأقمار صناعية على مدارات
   - تفاعل ماوس خفيف + نقر لتفصيل الصورة
   ========================================================= */

/* ---------- 1) بيانات الذكريات (تجريبية - استبدلها بسهولة) ---------- */
const memories = [
  {img:"https://picsum.photos/seed/geo1/500/500",  title:"انطلاق أول رحلة ميدانية", date:"مارس 2022", desc:"خرجنا بأول رحلة ميدانية لطلاب القسم لرصد التغيرات الجيومورفولوجية على الساحل، وكانت بداية شغفنا الحقيقي بالميدان."},
  {img:"https://picsum.photos/seed/geo2/500/500",  title:"تأسيس مختبر GIS", date:"سبتمبر 2022", desc:"افتتاح أول مختبر متخصص بنظم المعلومات الجغرافية في القسم، مزوّد بأجهزة GPS واستشعار عن بعد."},
  {img:"https://picsum.photos/seed/geo3/500/500",  title:"ورشة الاستشعار عن بعد", date:"يناير 2023", desc:"ورشة تدريبية مكثفة حول تحليل صور الأقمار الصناعية واستخراج بيانات الغطاء الأرضي."},
  {img:"https://picsum.photos/seed/geo4/500/500",  title:"مسح طبوغرافي ميداني", date:"أبريل 2023", desc:"فريق الطلاب ينفذ مسحاً طبوغرافياً كاملاً لمنطقة الدراسة باستخدام محطة رصد شاملة."},
  {img:"https://picsum.photos/seed/geo5/500/500",  title:"معرض مشاريع التخرج", date:"يونيو 2023", desc:"أول معرض سنوي لعرض مشاريع تخرج طلاب القسم أمام لجنة من المتخصصين والضيوف."},
  {img:"https://picsum.photos/seed/geo6/500/500",  title:"رحلة دراسة الكثبان الرملية", date:"نوفمبر 2023", desc:"دراسة حقلية لرصد حركة الكثبان الرملية وتأثيرها على الأنشطة الزراعية المحيطة."},
  {img:"https://picsum.photos/seed/geo7/500/500",  title:"تحليل بيانات المناخ", date:"يناير 2024", desc:"جلسات عملية لتحليل بيانات الأرصاد الجوية وربطها بنماذج التغير المناخي الإقليمي."},
  {img:"https://picsum.photos/seed/geo8/500/500",  title:"رحلة ميدانية للجبال", date:"فبراير 2024", desc:"استكشاف التكوينات الجيولوجية الجبلية ورصد طبقات الصخور المختلفة."},
  {img:"https://picsum.photos/seed/geo9/500/500",  title:"ورشة الطائرات المسيّرة", date:"مارس 2024", desc:"تدريب عملي على استخدام الدرونز لرسم الخرائط ثلاثية الأبعاد للمواقع الميدانية."},
  {img:"https://picsum.photos/seed/geo10/500/500", title:"زيارة مركز رصد الأقمار", date:"مايو 2024", desc:"زيارة علمية لمركز استقبال صور الأقمار الصناعية للتعرف على آلية معالجة البيانات."},
  {img:"https://picsum.photos/seed/geo11/500/500", title:"مسح المجتمعات الساحلية", date:"يوليو 2024", desc:"دراسة ميدانية حول تأثير ارتفاع منسوب المياه على التجمعات السكانية الساحلية."},
  {img:"https://picsum.photos/seed/geo12/500/500", title:"تطبيق GIS في التخطيط الحضري", date:"سبتمبر 2024", desc:"مشروع تطبيقي لتحليل النمو العمراني باستخدام طبقات بيانات متعددة المصادر."},
  {img:"https://picsum.photos/seed/geo13/500/500", title:"ندوة الخبراء الدوليين", date:"أكتوبر 2024", desc:"استضافة باحثين دوليين لمناقشة أحدث تطبيقات الذكاء الاصطناعي في علوم الجغرافيا."},
  {img:"https://picsum.photos/seed/geo14/500/500", title:"رحلة استكشاف الأنهار", date:"ديسمبر 2024", desc:"رصد التغيرات في مسارات الأنهار وتأثيرها على الأنظمة البيئية المحيطة."},
  {img:"https://picsum.photos/seed/geo15/500/500", title:"معسكر التدريب الصيفي", date:"يوليو 2025", desc:"معسكر تدريبي مكثف لطلاب السنة الثالثة على أدوات التحليل المكاني المتقدمة."},
  {img:"https://picsum.photos/seed/geo16/500/500", title:"إطلاق مشروع التخرج", date:"سبتمبر 2025", desc:"بداية رسمية لمشاريع التخرج التي تجمع بين الجغرافيا التطبيقية وتقنيات الـGIS الحديثة."},
  {img:"https://picsum.photos/seed/geo17/500/500", title:"رحلة بحثية للصحراء", date:"نوفمبر 2025", desc:"دراسة معمقة لظاهرة التصحر ورصد التغير في الغطاء النباتي عبر سنوات متتالية."},
  {img:"https://picsum.photos/seed/geo18/500/500", title:"مؤتمر الجغرافيا السنوي", date:"يناير 2026", desc:"عرض أبحاث القسم في المؤتمر السنوي للجغرافيا ونظم المعلومات الجغرافية."},
  {img:"https://picsum.photos/seed/geo19/500/500", title:"تسليم مشاريع التخرج", date:"أبريل 2026", desc:"تسليم نهائي لمشاريع التخرج أمام لجنة التحكيم الأكاديمية بعد سنة من العمل الميداني."},
  {img:"https://picsum.photos/seed/geo20/500/500", title:"حفل التخرج 🎓", date:"يونيو 2026", desc:"اللحظة التي طال انتظارها — تخرّج الدفعة وانطلاقهم لحياة مهنية جديدة في عالم الجغرافيا."},
];

/* ---------- 2) خلفية النجوم (Canvas 2D خفيف) ---------- */
(function starsBG(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){
    c.width = innerWidth; c.height = innerHeight;
    stars = [];
    const count = Math.floor((innerWidth*innerHeight)/4500);
    for(let i=0;i<count;i++){
      stars.push({
        x:Math.random()*c.width,
        y:Math.random()*c.height,
        r:Math.random()*1.3+0.2,
        a:Math.random()*0.6+0.2,
        tw:Math.random()*0.02+0.005
      });
    }
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle = '#070b14';
    ctx.fillRect(0,0,c.width,c.height);
    for(const s of stars){
      s.a += s.tw;
      const alpha = 0.4 + Math.sin(s.a)*0.4;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(220,235,240,${Math.max(0,alpha)})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize(); draw();
})();

/* ---------- 3) Three.js Globe ---------- */
const canvas = document.getElementById('globe-canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,0,9.2);

// إضاءة
const ambient = new THREE.AmbientLight(0x6688aa, 0.55);
scene.add(ambient);
const keyLight = new THREE.DirectionalLight(0x9fe8df, 1.1);
keyLight.position.set(5,3,5);
scene.add(keyLight);
const rimLight = new THREE.DirectionalLight(0x2a6f66, 0.6);
rimLight.position.set(-6,-2,-4);
scene.add(rimLight);

// نسيج الأرض (خريطة واقعية عبر canvas texture procedural — بدون اعتماد على ملف خارجي قد يفشل تحميله)
function buildEarthTexture(){
  const w=1024,h=512;
  const cv=document.createElement('canvas');
  cv.width=w; cv.height=h;
  const ctx=cv.getContext('2d');
  // محيطات
  const ocean = ctx.createLinearGradient(0,0,0,h);
  ocean.addColorStop(0,'#0c2d3e');
  ocean.addColorStop(0.5,'#0a3a44');
  ocean.addColorStop(1,'#082530');
  ctx.fillStyle=ocean;
  ctx.fillRect(0,0,w,h);

  // "قارات" عضوية باستخدام عدة دوائر متراكبة بنمط نويزي بسيط
  function blob(cx,cy,r,col){
    ctx.beginPath();
    const points=14;
    ctx.moveTo(cx+r,cy);
    for(let i=1;i<=points;i++){
      const ang=(i/points)*Math.PI*2;
      const rr=r*(0.7+Math.random()*0.6);
      ctx.lineTo(cx+Math.cos(ang)*rr, cy+Math.sin(ang)*rr*0.6);
    }
    ctx.closePath();
    ctx.fillStyle=col;
    ctx.fill();
  }
  const landColors=['#14523f','#1a6650','#0f3d2e','#1f7a5c'];
  const continents=[
    [150,150,90],[180,260,70],[330,180,110],[420,300,60],
    [560,140,100],[600,260,80],[760,170,120],[820,330,70],
    [900,210,90],[260,380,60],[680,400,55],[480,120,50]
  ];
  continents.forEach(([x,y,r],i)=>{
    blob(x,y,r, landColors[i%landColors.length]);
  });
  // خطوط شبكية خفيفة (خطوط طول/عرض)
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.lineWidth=1;
  for(let i=0;i<=12;i++){
    ctx.beginPath(); ctx.moveTo(i*(w/12),0); ctx.lineTo(i*(w/12),h); ctx.stroke();
  }
  for(let i=0;i<=6;i++){
    ctx.beginPath(); ctx.moveTo(0,i*(h/6)); ctx.lineTo(w,i*(h/6)); ctx.stroke();
  }
  return new THREE.CanvasTexture(cv);
}

const earthTex = buildEarthTexture();
earthTex.anisotropy = renderer.capabilities.getMaxAnisotropy();

const globeGeo = new THREE.SphereGeometry(2.6, 64, 64);
const globeMat = new THREE.MeshPhongMaterial({
  map: earthTex,
  shininess: 12,
  specular: new THREE.Color(0x1a3a3a),
  emissive: new THREE.Color(0x012a26),
  emissiveIntensity:0.15
});
const globe = new THREE.Mesh(globeGeo, globeMat);
scene.add(globe);

// غلاف توهج (atmosphere) حول الكرة
const glowGeo = new THREE.SphereGeometry(2.78, 64, 64);
const glowMat = new THREE.ShaderMaterial({
  uniforms:{ glowColor:{value:new THREE.Color(0x00d9c0)} },
  vertexShader:`
    varying vec3 vNormal;
    void main(){
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader:`
    uniform vec3 glowColor;
    varying vec3 vNormal;
    void main(){
      float intensity = pow(0.62 - dot(vNormal, vec3(0,0,1.0)), 3.0);
      gl_FragColor = vec4(glowColor, intensity * 0.9);
    }
  `,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  transparent: true
});
const glow = new THREE.Mesh(glowGeo, glowMat);
scene.add(glow);

// نقاط شبكية مدارية تزيينية (حلقات رفيعة حول الكرة)
function makeOrbitRing(radius, tiltX, tiltZ, opacity){
  const curve = new THREE.EllipseCurve(0,0, radius, radius, 0, Math.PI*2, false, 0);
  const pts = curve.getPoints(128);
  const geo = new THREE.BufferGeometry().setFromPoints(pts.map(p=>new THREE.Vector3(p.x,p.y,0)));
  const mat = new THREE.LineBasicMaterial({color:0x00d9c0, transparent:true, opacity});
  const ring = new THREE.Line(geo, mat);
  ring.rotation.x = tiltX;
  ring.rotation.z = tiltZ;
  return ring;
}
const ringGroup = new THREE.Group();
[3.6,4.3,5.0].forEach((r,i)=>{
  ringGroup.add(makeOrbitRing(r, Math.PI/2 + (i-1)*0.35, i*0.5, 0.10));
});
scene.add(ringGroup);

/* ---------- 4) توزيع الأقمار (الصور) على مدارات كروية ---------- */
const sats = memories.map((m, i)=>{
  // توزيع كروي متجانس (Fibonacci sphere) لتفادي التكدس
  const radius = 3.9 + (i % 3) * 0.55; // 3 طبقات مدارية
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  const y = 1 - (i / (memories.length - 1)) * 2; // -1..1
  const r = Math.sqrt(1 - y*y);
  const theta = goldenAngle * i;
  const baseDir = new THREE.Vector3(Math.cos(theta)*r, y, Math.sin(theta)*r).normalize();

  return {
    data:m,
    index:i,
    dir: baseDir,
    radius,
    speed: 0.06 + Math.random()*0.05,
    phase: Math.random()*Math.PI*2,
    el:null,
    screenPos:new THREE.Vector3(),
    active:false,
  };
});

/* ---------- 5) عناصر DOM للأقمار (overlay فوق الكانفاس) ---------- */
const stage = document.getElementById('stage');
sats.forEach(sat=>{
  const el = document.createElement('div');
  el.className='sat';
  el.innerHTML = `<img src="${sat.data.img}" alt="${sat.data.title}" loading="lazy">`;
  el.addEventListener('click', ()=> openViewer(sat.index));
  stage.appendChild(el);
  sat.el = el;
});

/* ---------- 6) تفاعل الماوس: تدوير خفيف للكرة ---------- */
let targetRotY = 0, targetRotX = 0;
let currentRotY = 0, currentRotX = 0;
let autoRotate = true;

window.addEventListener('mousemove', (e)=>{
  const nx = (e.clientX / window.innerWidth) * 2 - 1;
  const ny = (e.clientY / window.innerHeight) * 2 - 1;
  targetRotY = nx * 0.5;
  targetRotX = ny * 0.25;
  autoRotate = false;
});
window.addEventListener('mouseleave', ()=>{ autoRotate = true; });

// دعم اللمس: سحب بالإصبع يدوّر الكرة (drag-based, نسبي لا مطلق)
let touchActive = false;
let lastTouchX = 0, lastTouchY = 0;
let touchRotY = 0, touchRotX = 0;
let touchIdleTimer = null;

canvas.addEventListener('touchstart', (e)=>{
  if(e.touches.length !== 1) return;
  touchActive = true;
  autoRotate = false;
  lastTouchX = e.touches[0].clientX;
  lastTouchY = e.touches[0].clientY;
  clearTimeout(touchIdleTimer);
}, {passive:true});

canvas.addEventListener('touchmove', (e)=>{
  if(!touchActive || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastTouchX;
  const dy = e.touches[0].clientY - lastTouchY;
  lastTouchX = e.touches[0].clientX;
  lastTouchY = e.touches[0].clientY;

  touchRotY += dx * 0.006;
  touchRotX += dy * 0.004;
  touchRotX = Math.max(-0.6, Math.min(0.6, touchRotX));
  targetRotY = touchRotY;
  targetRotX = touchRotX;

  fadeHint();
  e.preventDefault(); // يمنع تمرير الصفحة أثناء تدوير الكرة
}, {passive:false});

canvas.addEventListener('touchend', ()=>{
  touchActive = false;
  // بعد ثانيتين بدون لمس، يرجع الدوران التلقائي
  touchIdleTimer = setTimeout(()=>{ autoRotate = true; }, 2000);
});

// إخفاء التلميح بعد أول تفاعل
let hinted = false;
function fadeHint(){
  if(hinted) return;
  hinted = true;
  document.getElementById('hintEl').classList.add('fade');
}
window.addEventListener('mousemove', fadeHint, {once:true});
window.addEventListener('touchstart', fadeHint, {once:true});

/* ---------- 7) العداد ---------- */
document.getElementById('memCount').textContent = memories.length;
document.getElementById('totalIdx').textContent = memories.length;

/* ---------- 8) حلقة الرندر ---------- */
let globalAngle = 0;
const v3 = new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  globalAngle += 0.0028;

  if(autoRotate){
    targetRotY += 0.0009;
  }
  currentRotY += (targetRotY - currentRotY) * 0.04;
  currentRotX += (targetRotX - currentRotX) * 0.04;

  globe.rotation.y = currentRotY + globalAngle*0.3;
  globe.rotation.x = currentRotX;
  glow.rotation.copy(globe.rotation);
  ringGroup.rotation.y = currentRotY*0.6 + globalAngle*0.15;

  // تحديث مواقع الأقمار + DOM overlay
  sats.forEach(sat=>{
    if(sat.active) { sat.el.style.opacity='0'; return; }

    const t = globalAngle * (1 + sat.speed) + sat.phase;
    // دوران المتجه الأساسي حول محور Y بسيط لإعطاء حركة مدارية
    const cosT = Math.cos(t*0.4), sinT = Math.sin(t*0.4);
    const x = sat.dir.x*cosT - sat.dir.z*sinT;
    const z = sat.dir.x*sinT + sat.dir.z*cosT;
    const y = sat.dir.y;

    v3.set(x,y,z).normalize().multiplyScalar(sat.radius);
    // طبّق دوران الكرة الكلي حتى تتبع الأقمار حركة المشهد بانسجام بسيط
    v3.applyAxisAngle(new THREE.Vector3(0,1,0), currentRotY*0.3);

    sat.worldPos = v3.clone();

    const projected = v3.clone().project(camera);
    const sx = (projected.x*0.5+0.5) * window.innerWidth;
    const sy = (-projected.y*0.5+0.5) * window.innerHeight;

    sat.el.style.left = sx+'px';
    sat.el.style.top = sy+'px';

    // قمر خلف الكرة من جهة الكاميرا => يصغر ويخفت (إحساس بالعمق)
    const depthScale = THREE.MathUtils.clamp((projected.z+1)/2, 0,1);
    const scale = 1 - depthScale*0.55;
    const opacity = projected.z > 0.55 ? 0.18 : 1 - depthScale*0.55;
    sat.el.style.transform = `translate(-50%,-50%) scale(${scale.toFixed(3)})`;
    sat.el.style.opacity = opacity.toFixed(2);
    sat.el.style.zIndex = String(Math.round((1-depthScale)*100)+3);
  });

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ---------- 9) عارض التفاصيل (Viewer) ---------- */
let currentIndex = 0;
const backdrop = document.getElementById('viewerBackdrop');
const viewerImg = document.getElementById('viewerImg');
const viewerDate = document.getElementById('viewerDate');
const viewerTitle = document.getElementById('viewerTitle');
const viewerDesc = document.getElementById('viewerDesc');
const curIdxEl = document.getElementById('curIdx');

function openViewer(index){
  currentIndex = index;
  sats[index].active = true; // يخفي القمر من المدار (خرج للعرض)
  renderViewer();
  backdrop.classList.add('open');
}
function closeViewer(){
  backdrop.classList.remove('open');
  sats.forEach(s=> s.active = false); // يرجع كل الأقمار للمدار
}
function renderViewer(){
  const m = memories[currentIndex];
  viewerImg.src = m.img;
  viewerImg.alt = m.title;
  viewerDate.textContent = m.date;
  viewerTitle.textContent = m.title;
  viewerDesc.textContent = m.desc;
  curIdxEl.textContent = currentIndex+1;
}
document.getElementById('closeBtn').addEventListener('click', closeViewer);
backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) closeViewer(); });

document.getElementById('nextBtn').addEventListener('click', ()=>{
  sats[currentIndex].active = false;
  currentIndex = (currentIndex+1) % memories.length;
  sats[currentIndex].active = true;
  renderViewer();
});
document.getElementById('prevBtn').addEventListener('click', ()=>{
  sats[currentIndex].active = false;
  currentIndex = (currentIndex-1+memories.length) % memories.length;
  sats[currentIndex].active = true;
  renderViewer();
});
document.addEventListener('keydown', (e)=>{
  if(!backdrop.classList.contains('open')) return;
  if(e.key==='Escape') closeViewer();
  if(e.key==='ArrowLeft') document.getElementById('nextBtn').click(); // RTL: يسار = التالي بصرياً
  if(e.key==='ArrowRight') document.getElementById('prevBtn').click();
});
</script>
</body>
