<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة | Fesageo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#070b14;
    --teal:#00d9c0;
    --teal-dim: rgba(0,217,192,0.25);
    --gold:#d4af6a;
    --gold-bright:#f0c878;
    --gold-dim: rgba(212,175,106,0.35);
    --ink:#eaf2f4;
    --ink-dim:#9fb3c0;
    --danger:#e0625a;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--bg-deep);
    color:var(--ink);
    font-family:'Tajawal',sans-serif;
    width:100%;
    min-height:100%;
  }

  /* ============ حالة التحقق من تسجيل الدخول ============ */
  #authGate{
    position:fixed; inset:0;
    background:var(--bg-deep);
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
  }
  #authGate.hidden{ display:none; }
  .auth-spinner{
    width:42px; height:42px;
    border-radius:50%;
    border:3px solid rgba(212,175,106,0.2);
    border-top-color:var(--gold);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .auth-gate-text{ color:var(--ink-dim); font-size:14px; }

  #appRoot{ display:none; }
  #appRoot.ready{ display:block; }

  /* ============ الرأس العلوي ============ */
  .top-bar{
    position:sticky; top:0; z-index:20;
    background:rgba(7,11,20,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:16px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  .top-bar-title{
    font-size:18px;
    font-weight:800;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .top-bar-title .eyebrow{
    font-size:11px;
    color:var(--gold);
    letter-spacing:.1em;
    text-transform:uppercase;
    font-weight:600;
    display:block;
  }
  .user-info{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:13px;
    color:var(--ink-dim);
  }
  .logout-btn{
    background:rgba(224,98,90,0.12);
    border:1px solid rgba(224,98,90,0.3);
    color:var(--danger);
    padding:7px 16px;
    border-radius:8px;
    font-family:inherit;
    font-size:12.5px;
    cursor:pointer;
    transition:background .2s ease;
  }
  .logout-btn:hover{ background:rgba(224,98,90,0.22); }

  /* ============ التبويبات ============ */
  .tabs-bar{
    display:flex;
    gap:8px;
    padding:16px 24px 0;
    overflow-x:auto;
    flex-wrap:wrap;
  }
  .tab-btn{
    background:rgba(255,255,255,0.04);
    border:1.4px solid rgba(255,255,255,0.08);
    color:var(--ink-dim);
    padding:10px 20px;
    border-radius:10px 10px 0 0;
    font-family:inherit;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    transition:all .2s ease;
    white-space:nowrap;
  }
  .tab-btn:hover{ color:var(--ink); border-color:rgba(212,175,106,0.2); }
  .tab-btn.active{
    background:rgba(212,175,106,0.1);
    border-color:var(--gold-dim);
    color:var(--gold-bright);
  }

  /* ============ منطقة المحتوى ============ */
  .content-area{
    padding:24px;
    max-width:980px;
    margin:0 auto;
  }
  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  .panel-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
  }
  .panel-title{
    font-size:19px;
    font-weight:800;
    color:#fff;
  }
  .add-new-btn{
    background:linear-gradient(135deg, var(--gold), #b8893f);
    color:#1a1304;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    font-family:inherit;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
    transition:transform .2s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .add-new-btn:hover{ transform:translateY(-1px); }

  /* ============ قائمة العناصر ============ */
  .items-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .item-card{
    background:linear-gradient(160deg, rgba(19,35,63,.35), rgba(7,14,26,.5));
    border:1.4px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
  }
  .item-info{ flex:1; min-width:200px; }
  .item-title{
    font-size:14.5px;
    font-weight:700;
    color:#fff;
    margin:0 0 4px;
  }
  .item-sub{
    font-size:12.5px;
    color:var(--ink-dim);
    margin:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    max-width:480px;
  }
  .item-actions{ display:flex; gap:8px; flex-shrink:0; }
  .icon-btn{
    width:34px; height:34px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.04);
    color:var(--ink-dim);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all .2s ease;
    font-size:14px;
  }
  .icon-btn.edit:hover{ border-color:var(--gold-dim); color:var(--gold); background:rgba(212,175,106,0.08); }
  .icon-btn.delete:hover{ border-color:rgba(224,98,90,0.4); color:var(--danger); background:rgba(224,98,90,0.08); }

  .empty-state, .loading-state{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-dim);
    font-size:13.5px;
  }

  /* ============ نافذة الفورم (popup) ============ */
  .form-backdrop{
    position:fixed; inset:0;
    background:rgba(4,7,14,0.82);
    backdrop-filter:blur(6px);
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
    padding:20px;
  }
  .form-backdrop.open{ opacity:1; pointer-events:auto; }

  .form-card{
    width:min(540px, 94vw);
    max-height:86vh;
    overflow-y:auto;
    background:linear-gradient(165deg, rgba(19,35,63,.92), rgba(7,11,20,.97));
    border:1.4px solid var(--gold-dim);
    border-radius:18px;
    padding:28px 26px 24px;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
    position:relative;
  }
  .form-card-title{
    font-size:18px;
    font-weight:800;
    color:#fff;
    margin:0 0 20px;
  }
  .form-field{ margin-bottom:15px; text-align:right; }
  .form-field label{
    display:block;
    font-size:12.5px;
    color:var(--ink-dim);
    margin-bottom:6px;
    font-weight:500;
  }
  .form-field input, .form-field textarea{
    width:100%;
    background:rgba(255,255,255,0.04);
    border:1.4px solid rgba(255,255,255,0.1);
    border-radius:9px;
    padding:11px 13px;
    color:#fff;
    font-size:13.5px;
    font-family:inherit;
    resize:vertical;
  }
  .form-field input:focus, .form-field textarea:focus{
    outline:none;
    border-color:var(--gold);
  }
  .form-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
  }
  .btn-save{
    flex:1;
    background:linear-gradient(135deg, var(--gold), #b8893f);
    color:#1a1304;
    border:none;
    padding:12px;
    border-radius:9px;
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-save:disabled{ opacity:.6; cursor:not-allowed; }
  .btn-cancel{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    color:var(--ink-dim);
    padding:12px 20px;
    border-radius:9px;
    font-family:inherit;
    font-size:14px;
    cursor:pointer;
  }
  .form-close{
    position:absolute;
    top:16px; left:16px;
    width:30px; height:30px;
    border-radius:50%;
    background:rgba(0,0,0,.3);
    border:none;
    color:#fff;
    cursor:pointer;
    font-size:15px;
  }
  .form-error{
    background:rgba(224,98,90,0.1);
    border:1px solid rgba(224,98,90,0.3);
    color:#ff9a92;
    font-size:12.5px;
    padding:10px 12px;
    border-radius:8px;
    margin-top:12px;
    display:none;
  }
  .form-error.show{ display:block; }

  /* ============ تأكيد الحذف ============ */
  .confirm-backdrop{
    position:fixed; inset:0;
    background:rgba(4,7,14,0.82);
    z-index:60;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
    padding:20px;
  }
  .confirm-backdrop.open{ opacity:1; pointer-events:auto; }
  .confirm-card{
    width:min(380px, 90vw);
    background:linear-gradient(165deg, rgba(19,35,63,.95), rgba(7,11,20,.98));
    border:1.4px solid rgba(224,98,90,0.3);
    border-radius:16px;
    padding:26px 22px;
    text-align:center;
  }
  .confirm-card p{ font-size:14px; color:var(--ink-dim); margin:8px 0 20px; line-height:1.7; }
  .confirm-actions{ display:flex; gap:10px; }
  .btn-confirm-delete{
    flex:1;
    background:var(--danger);
    color:#fff;
    border:none;
    padding:11px;
    border-radius:9px;
    font-family:inherit;
    font-weight:700;
    cursor:pointer;
  }

  @media (max-width:600px){
    .top-bar{ padding:12px 16px; }
    .tabs-bar{ padding:12px 16px 0; }
    .content-area{ padding:16px; }
  }
</style>
</head>
<body>

<!-- ============ حالة التحقق من الدخول ============ -->
<div id="authGate">
  <div class="auth-spinner"></div>
  <p class="auth-gate-text">جاري التحقق من صلاحياتك...</p>
</div>

<!-- ============ التطبيق الرئيسي (يظهر فقط بعد تأكيد الدخول) ============ -->
<div id="appRoot">

  <div class="top-bar">
    <div class="top-bar-title">
      <div>
        <span class="eyebrow">Fesageo</span>
        لوحة الإدارة
      </div>
    </div>
    <div class="user-info">
      <span id="currentUserEmail"></span>
      <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
    </div>
  </div>

  <div class="tabs-bar" id="tabsBar"></div>

  <div class="content-area" id="contentArea"></div>

</div>

<!-- ============ نافذة الفورم (مشتركة لكل المجموعات) ============ -->
<div class="form-backdrop" id="formBackdrop">
  <div class="form-card">
    <button class="form-close" id="formCloseBtn">✕</button>
    <h3 class="form-card-title" id="formTitle"></h3>
    <form id="dynamicForm"></form>
    <div class="form-error" id="formError"></div>
    <div class="form-actions">
      <button type="submit" form="dynamicForm" class="btn-save" id="formSaveBtn">حفظ</button>
      <button type="button" class="btn-cancel" id="formCancelBtn">إلغاء</button>
    </div>
  </div>
</div>

<!-- ============ تأكيد الحذف ============ -->
<div class="confirm-backdrop" id="confirmBackdrop">
  <div class="confirm-card">
    <h3 style="margin:0; color:#fff; font-size:16px;">تأكيد الحذف</h3>
    <p>هل أنت متأكد من حذف هذا العنصر؟ لا يمكن التراجع عن هذا الإجراء.</p>
    <div class="confirm-actions">
      <button class="btn-confirm-delete" id="confirmDeleteBtn">حذف نهائياً</button>
      <button class="btn-cancel" id="confirmCancelBtn">إلغاء</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, getDoc,
  addDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCM8G90ijGh-05WBJOgLKgM0oscieDRiNs",
  authDomain: "fesageo-cf82b.firebaseapp.com",
  projectId: "fesageo-cf82b",
  storageBucket: "fesageo-cf82b.firebasestorage.app",
  messagingSenderId: "817340126615",
  appId: "1:817340126615:web:d115544a1e5b4354b8a0d2",
  measurementId: "G-XN2QXPBQMH"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* =========================================================
   1) تعريف المجموعات (config-driven)
   كل مجموعة لها: عنوان، اسم المجموعة بـ Firestore، نوع المعرّف،
   وقائمة الحقول (الاسم بالكود، التسمية المعروضة، نوع الإدخال)
   ========================================================= */
const collectionsConfig = {
  letters: {
    title: "رسائل الخريجين",
    autoId: true,
    titleField: "name",
    subField: "message",
    fields: [
      {name:"name", label:"اسم الخريج", type:"text"},
      {name:"year", label:"سنة التخرج", type:"text"},
      {name:"portrait", label:"رابط الصورة الشخصية", type:"text"},
      {name:"message", label:"نص الرسالة", type:"textarea"}
    ]
  },
  memories: {
    title: "معرض الصور",
    autoId: true,
    titleField: "title",
    subField: "desc",
    fields: [
      {name:"img", label:"رابط الصورة", type:"text"},
      {name:"title", label:"العنوان", type:"text"},
      {name:"date", label:"التاريخ", type:"text"},
      {name:"desc", label:"الوصف", type:"textarea"}
    ]
  },
  courses: {
    title: "المواد الدراسية",
    autoId: true,
    titleField: "courseName",
    subField: "supervisorName",
    fields: [
      {name:"courseName", label:"اسم المادة", type:"text"},
      {name:"supervisorName", label:"اسم الدكتور المشرف", type:"text"},
      {name:"file", label:"رابط الملف (Google Drive)", type:"text"}
    ]
  },
  "doctors-page": {
    title: "ملفات الدكاترة (doctors.html)",
    autoId: false,
    fixedIds: ["ali","reem","fatima","najla"],
    titleField: "name",
    subField: "welcomeMessage",
    fields: [
      {name:"name", label:"اسم الدكتور", type:"text"},
      {name:"welcomeMessage", label:"رسالة الترحيب", type:"textarea"},
      {name:"cvLink", label:"رابط السيرة الذاتية (Google Drive)", type:"text"}
    ]
  }
};

let currentUser = null;
let activeTab = "letters";
let cache = {}; // كاش بسيط لكل مجموعة بعد أول جلب، يُلغى بعد أي تعديل/حذف/إضافة

/* =========================================================
   2) التحقق من تسجيل الدخول
   ========================================================= */
onAuthStateChanged(auth, (user) => {
  if(user){
    currentUser = user;
    document.getElementById('currentUserEmail').textContent = user.email;
    document.getElementById('authGate').classList.add('hidden');
    document.getElementById('appRoot').classList.add('ready');
    buildTabs();
    switchTab(activeTab);
  } else {
    // غير مسجّل دخول - رجوع فوري لصفحة الدخول
    window.location.href = 'login.html';
  }
});

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await signOut(auth);
  window.location.href = 'login.html';
});

/* =========================================================
   3) بناء التبويبات وتبديلها
   ========================================================= */
function buildTabs(){
  const tabsBar = document.getElementById('tabsBar');
  tabsBar.innerHTML = '';
  Object.keys(collectionsConfig).forEach(key=>{
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = collectionsConfig[key].title;
    btn.dataset.tab = key;
    btn.addEventListener('click', ()=> switchTab(key));
    tabsBar.appendChild(btn);
  });
}

function switchTab(key){
  activeTab = key;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab === key);
  });
  renderPanel(key);
}

/* =========================================================
   4) عرض لوحة مجموعة معيّنة (القائمة + زر الإضافة)
   ========================================================= */
async function renderPanel(key){
  const config = collectionsConfig[key];
  const contentArea = document.getElementById('contentArea');

  contentArea.innerHTML = `
    <div class="panel-header">
      <h2 class="panel-title">${config.title}</h2>
      ${config.autoId ? `<button class="add-new-btn" id="addNewBtn">+ إضافة جديد</button>` : ''}
    </div>
    <div class="items-list" id="itemsList">
      <div class="loading-state">جاري التحميل...</div>
    </div>
  `;

  if(config.autoId){
    document.getElementById('addNewBtn').addEventListener('click', ()=> openForm(key, null));
  }

  try{
    let items;
    if(cache[key]){
      items = cache[key];
    } else if(config.autoId){
      const snapshot = await getDocs(collection(db, key));
      items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      cache[key] = items;
    } else {
      // معرّفات ثابتة (مثل doctors-page: ali/reem/fatima/najla)
      items = [];
      for(const fixedId of config.fixedIds){
        const docSnap = await getDoc(doc(db, key, fixedId));
        items.push({ id: fixedId, exists: docSnap.exists(), ...(docSnap.exists() ? docSnap.data() : {}) });
      }
      cache[key] = items;
    }

    renderItemsList(key, items);
  } catch(err){
    console.error(`خطأ بجلب ${key}:`, err);
    document.getElementById('itemsList').innerHTML = `<div class="empty-state">تعذّر تحميل البيانات، حاول تحديث الصفحة.</div>`;
  }
}

function renderItemsList(key, items){
  const config = collectionsConfig[key];
  const listEl = document.getElementById('itemsList');

  if(items.length === 0){
    listEl.innerHTML = `<div class="empty-state">لا توجد عناصر بعد — اضغط "إضافة جديد" لبدء الإضافة.</div>`;
    return;
  }

  listEl.innerHTML = items.map(item=>{
    const titleText = item[config.titleField] || (config.fixedIds ? `(${item.id})` : '(بدون عنوان)');
    const subText = item[config.subField] || '';
    const notSetup = config.fixedIds && !item.exists;

    return `
      <div class="item-card">
        <div class="item-info">
          <p class="item-title">${notSetup ? `${item.id} — لم تُعبّى بياناته بعد` : titleText}</p>
          ${subText ? `<p class="item-sub">${subText}</p>` : ''}
        </div>
        <div class="item-actions">
          <button class="icon-btn edit" data-id="${item.id}" data-key="${key}" title="تعديل">✏️</button>
          ${config.autoId ? `<button class="icon-btn delete" data-id="${item.id}" data-key="${key}" title="حذف">🗑️</button>` : ''}
        </div>
      </div>
    `;
  }).join('');

  listEl.querySelectorAll('.icon-btn.edit').forEach(btn=>{
    btn.addEventListener('click', ()=> openForm(btn.dataset.key, btn.dataset.id));
  });
  listEl.querySelectorAll('.icon-btn.delete').forEach(btn=>{
    btn.addEventListener('click', ()=> openDeleteConfirm(btn.dataset.key, btn.dataset.id));
  });
}

/* =========================================================
   5) فتح وإغلاق الفورم (إضافة أو تعديل)
   ========================================================= */
const formBackdrop = document.getElementById('formBackdrop');
const dynamicForm = document.getElementById('dynamicForm');
const formTitle = document.getElementById('formTitle');
const formError = document.getElementById('formError');
const formSaveBtn = document.getElementById('formSaveBtn');

let currentFormContext = { key: null, docId: null };

async function openForm(key, docId){
  const config = collectionsConfig[key];
  currentFormContext = { key, docId };
  formError.classList.remove('show');

  formTitle.textContent = docId ? `تعديل — ${config.title}` : `إضافة جديد — ${config.title}`;

  // نجيب بيانات العنصر الحالي لو كان تعديل، أو نبدأ فاضي لو إضافة
  let existingData = {};
  if(docId){
    const cachedItem = (cache[key] || []).find(i => i.id === docId);
    existingData = cachedItem || {};
  }

  dynamicForm.innerHTML = config.fields.map(f=>{
    const value = existingData[f.name] || '';
    if(f.type === 'textarea'){
      return `
        <div class="form-field">
          <label>${f.label}</label>
          <textarea name="${f.name}" rows="4">${value}</textarea>
        </div>
      `;
    }
    return `
      <div class="form-field">
        <label>${f.label}</label>
        <input type="text" name="${f.name}" value="${value.replace(/"/g,'&quot;')}">
      </div>
    `;
  }).join('');

  formBackdrop.classList.add('open');
}

function closeForm(){
  formBackdrop.classList.remove('open');
  dynamicForm.reset();
}
document.getElementById('formCloseBtn').addEventListener('click', closeForm);
document.getElementById('formCancelBtn').addEventListener('click', closeForm);
formBackdrop.addEventListener('click', (e)=>{ if(e.target === formBackdrop) closeForm(); });

dynamicForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const { key, docId } = currentFormContext;
  const config = collectionsConfig[key];

  const formData = new FormData(dynamicForm);
  const dataObj = {};
  config.fields.forEach(f=>{
    dataObj[f.name] = formData.get(f.name) || '';
  });

  formSaveBtn.disabled = true;
  formSaveBtn.textContent = 'جاري الحفظ...';
  formError.classList.remove('show');

  try{
    if(docId){
      // تعديل وثيقة موجودة
      await updateDoc(doc(db, key, docId), dataObj);
    } else if(config.autoId){
      // إضافة وثيقة جديدة بمعرّف عشوائي + وقت إنشاء
      dataObj.createdAt = new Date();
      await addDoc(collection(db, key), dataObj);
    }

    delete cache[key]; // نلغي الكاش حتى تنعكس التعديلات فوراً
    closeForm();
    renderPanel(key);

  } catch(err){
    console.error('خطأ بالحفظ:', err);
    formError.textContent = 'تعذّر الحفظ. تأكد من تسجيل دخولك وحاول مرة أخرى.';
    formError.classList.add('show');
  } finally {
    formSaveBtn.disabled = false;
    formSaveBtn.textContent = 'حفظ';
  }
});

/* =========================================================
   6) تأكيد وتنفيذ الحذف
   ========================================================= */
const confirmBackdrop = document.getElementById('confirmBackdrop');
let pendingDelete = { key: null, docId: null };

function openDeleteConfirm(key, docId){
  pendingDelete = { key, docId };
  confirmBackdrop.classList.add('open');
}
function closeDeleteConfirm(){
  confirmBackdrop.classList.remove('open');
}
document.getElementById('confirmCancelBtn').addEventListener('click', closeDeleteConfirm);
confirmBackdrop.addEventListener('click', (e)=>{ if(e.target === confirmBackdrop) closeDeleteConfirm(); });

document.getElementById('confirmDeleteBtn').addEventListener('click', async ()=>{
  const { key, docId } = pendingDelete;
  try{
    await deleteDoc(doc(db, key, docId));
    delete cache[key];
    closeDeleteConfirm();
    renderPanel(key);
  } catch(err){
    console.error('خطأ بالحذف:', err);
    alert('تعذّر حذف العنصر، حاول مرة أخرى.');
    closeDeleteConfirm();
  }
});
</script>
